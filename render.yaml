services:
  - type: web
    name: boranalytics-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false # means: set manually in Render dashboard
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        sync: false # set after Vercel URL is known
